<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{オブジェクト名} | Salesforce</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/styles/salesforce-lightning-design-system.min.css">
<style>
  body { background: linear-gradient(to bottom, #b0c4df 0%, #f3f3f3 250px) #f3f3f3; min-width: 1024px; margin: 0; }
  .sf-main { max-width: 1440px; margin: 0 auto; padding: 1rem; }
  .sf-header { background: white; height: 3rem; display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; border-bottom: 1px solid #c9c9c9; position: sticky; top: 0; z-index: 50; }
  .sf-header-search { width: 50%; max-width: 36rem; }
  .sf-header-actions { display: flex; align-items: center; gap: 0.5rem; }
  .sf-cloud-logo { width: 36px; height: auto; }
  .sf-icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 2rem; height: 2rem; border-radius: 0.25rem; cursor: pointer; background: transparent; border: none; padding: 0; }
  .sf-icon-btn:hover { background: #f3f3f3; }
  .sf-icon-btn img { width: 18px; height: 18px; filter: brightness(0) saturate(100%) invert(43%) sepia(13%) saturate(295%) hue-rotate(180deg) brightness(95%) contrast(85%); }
  .slds-input__icon { filter: brightness(0) saturate(100%) invert(43%) sepia(13%) saturate(295%) hue-rotate(180deg) brightness(95%) contrast(85%); }
  .sf-favorite-btn { display: inline-flex; align-items: center; gap: 4px; padding: 0 10px; height: 2rem; background: #1b96ff; border-radius: 0.25rem; border: none; cursor: pointer; }
  .sf-favorite-btn img { width: 14px; height: 14px; filter: brightness(0) invert(1) !important; }
  .sf-notify-wrap { position: relative; display: inline-flex; }
  .sf-notify-dot { position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; background: #ea001e; border-radius: 50%; border: 1.5px solid white; }
  .sf-context-bar { background: white; border-bottom: 1px solid #dddbda; padding: 0 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .sf-context-bar nav ul { display: flex; gap: 0.5rem; list-style: none; padding: 0; margin: 0; }
  .sf-context-bar nav ul li { display: flex; align-items: center; padding: 0 0.25rem; font-size: 0.875rem; }
  .sf-context-bar nav ul li.is-active { border-bottom: 3px solid #1589ee; }
  .sf-context-bar nav ul li.is-active a { color: #0070d2; font-weight: 700; }
  .sf-context-bar nav ul li a { color: #444; text-decoration: none; padding: 0.5rem 0; }
  .sf-app-launcher { display: inline-flex; align-items: center; justify-content: center; width: 2rem; height: 2rem; cursor: pointer; }
  .sf-app-launcher-grid { display: grid; grid-template-columns: repeat(3, 4px); grid-template-rows: repeat(3, 4px); gap: 3px; }
  .sf-app-launcher-grid span { width: 4px; height: 4px; background: #54698d; border-radius: 1px; }
  .sf-app-name { font-size: 1.125rem; font-weight: 700; color: #181818; padding: 0.5rem 0; margin-right: 0.75rem; }
</style>
</head>
<body class="slds-scope">

<header class="sf-header">
  <img class="sf-cloud-logo" src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/images/logo.svg" alt="Salesforce" />
  <div class="sf-header-search">
    <div class="slds-form-element">
      <div class="slds-form-element__control slds-input-has-icon slds-input-has-icon_left">
        <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/search.svg" alt="" class="slds-icon slds-input__icon slds-icon-text-default slds-icon_x-small" />
        <input type="search" placeholder="検索..." class="slds-input">
      </div>
    </div>
  </div>
  <div class="sf-header-actions">
    <button class="sf-icon-btn"><img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/agent_astro.svg" alt="" /></button>
    <button class="sf-favorite-btn"><img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/favorite.svg" alt="" /><img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/down.svg" alt="" style="width:10px;height:10px;" /></button>
    <button class="sf-icon-btn"><img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/add.svg" alt="" /></button>
    <button class="sf-icon-btn"><img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/help.svg" alt="" /></button>
    <button class="sf-icon-btn"><img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/setup.svg" alt="" /></button>
    <span class="sf-notify-wrap"><button class="sf-icon-btn"><img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/notification.svg" alt="" /></button><span class="sf-notify-dot"></span></span>
    <span class="slds-avatar slds-avatar_circle slds-avatar_small" style="margin-left:0.5rem;"><img src="https://ui-avatars.com/api/?name=User&background=1B96FF&color=fff" alt="User"></span>
  </div>
</header>

<div class="sf-context-bar">
  <div class="sf-app-launcher"><div class="sf-app-launcher-grid"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div>
  <span class="sf-app-name">Sales</span>
  <nav>
    <ul>
      <li><a href="#">ホーム</a></li>
      <li class="is-active"><a href="#">取引先 ▾</a></li>
      <li><a href="#">取引先責任者 ▾</a></li>
      <li><a href="#">商談 ▾</a></li>
      <li><a href="#">レポート ▾</a></li>
    </ul>
  </nav>
</div>

<main class="sf-main">

  <!-- ListView Header -->
  <div class="slds-page-header slds-page-header_object-home slds-m-bottom_small">
    <div class="slds-page-header__row">
      <div class="slds-page-header__col-title">
        <div class="slds-media">
          <div class="slds-media__figure">
            <span class="slds-icon_container slds-icon-standard-account">
              <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/standard/account.svg" alt="" class="slds-icon slds-icon_medium" />
            </span>
          </div>
          <div class="slds-media__body">
            <p class="slds-text-title">取引先</p>
            <h1 class="slds-page-header__title">最近参照したデータ</h1>
            <p class="slds-page-header__name-meta">3 件 · 数秒前に更新</p>
          </div>
        </div>
      </div>
      <div class="slds-page-header__col-actions">
        <ul class="slds-button-group-list">
          <li><button class="slds-button slds-button_neutral">グラフ</button></li>
          <li><button class="slds-button slds-button_neutral">フィルタ</button></li>
          <li><button class="slds-button slds-button_neutral">インポート</button></li>
          <li><button class="slds-button slds-button_brand">新規</button></li>
        </ul>
      </div>
    </div>
  </div>

  <!-- DataTable -->
  <article class="slds-card">
    <div class="slds-grid slds-grid_align-spread slds-p-around_x-small slds-border_bottom">
      <div class="slds-text-body_small slds-text-color_weak">3 件中 1 - 3 件を表示</div>
      <div class="slds-grid slds-grid_vertical-align-center" style="gap:0.5rem;">
        <div class="slds-form-element">
          <div class="slds-form-element__control slds-input-has-icon slds-input-has-icon_left">
            <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/search.svg" alt="" class="slds-icon slds-input__icon slds-icon-text-default slds-icon_x-small" />
            <input type="search" placeholder="このリストを検索..." class="slds-input">
          </div>
        </div>
      </div>
    </div>

    <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_resizable-cols">
      <thead>
        <tr class="slds-line-height_reset">
          <th style="width:3rem"><input type="checkbox"></th>
          <th><span class="slds-truncate">取引先名</span></th>
          <th><span class="slds-truncate">電話</span></th>
          <th><span class="slds-truncate">業種</span></th>
          <th><span class="slds-truncate">取引先種別</span></th>
          <th><span class="slds-truncate">所有者</span></th>
        </tr>
      </thead>
      <tbody>
        <tr class="slds-hint-parent">
          <td><input type="checkbox"></td>
          <th scope="row"><a href="#">株式会社 サンプル</a></th>
          <td>03-1234-5678</td>
          <td>製造</td>
          <td>顧客 - 直接</td>
          <td><a href="#">担当者A</a></td>
        </tr>
        <tr class="slds-hint-parent">
          <td><input type="checkbox"></td>
          <th scope="row"><a href="#">サンプル株式会社</a></th>
          <td>06-9876-5432</td>
          <td>小売</td>
          <td>顧客 - パートナー</td>
          <td><a href="#">担当者B</a></td>
        </tr>
        <tr class="slds-hint-parent">
          <td><input type="checkbox"></td>
          <th scope="row"><a href="#">テスト株式会社</a></th>
          <td>+1-555-0100</td>
          <td>金融</td>
          <td>見込み客</td>
          <td><a href="#">担当者C</a></td>
        </tr>
      </tbody>
    </table>

    <footer class="slds-card__footer slds-text-body_small slds-text-color_weak">3 件中 1 - 3 件を表示</footer>
  </article>
</main>

</body>
</html>
