<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商談 (カンバン) | Salesforce</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/styles/salesforce-lightning-design-system.min.css">
<style>
  body { background: linear-gradient(to bottom, #b0c4df 0%, #f3f3f3 250px) #f3f3f3; min-width: 1024px; margin: 0; }
  .sf-main { max-width: 1600px; margin: 0 auto; padding: 1rem; }
  .sf-header { background: white; height: 3rem; display: flex; align-items: center; justify-content: space-between; padding: 0 1rem; border-bottom: 1px solid #c9c9c9; position: sticky; top: 0; z-index: 50; }
  .sf-header-search { width: 50%; max-width: 36rem; }
  .sf-header-actions { display: flex; align-items: center; gap: 0.5rem; }
  .sf-cloud-logo { width: 36px; height: auto; }
  .sf-icon-btn { display: inline-flex; align-items: center; justify-content: center; width: 2rem; height: 2rem; border-radius: 0.25rem; cursor: pointer; background: transparent; border: none; padding: 0; }
  .sf-icon-btn img { width: 18px; height: 18px; filter: brightness(0) saturate(100%) invert(43%) sepia(13%) saturate(295%) hue-rotate(180deg) brightness(95%) contrast(85%); }
  .slds-input__icon { filter: brightness(0) saturate(100%) invert(43%) sepia(13%) saturate(295%) hue-rotate(180deg) brightness(95%) contrast(85%); }
  .sf-favorite-btn { display: inline-flex; align-items: center; gap: 4px; padding: 0 10px; height: 2rem; background: #1b96ff; border-radius: 0.25rem; border: none; cursor: pointer; }
  .sf-favorite-btn img { width: 14px; height: 14px; filter: brightness(0) invert(1) !important; }
  .sf-context-bar { background: white; border-bottom: 1px solid #dddbda; padding: 0 1rem; display: flex; align-items: center; gap: 0.5rem; }
  .sf-context-bar nav ul { display: flex; gap: 0.5rem; list-style: none; padding: 0; margin: 0; }
  .sf-context-bar nav ul li { padding: 0 0.25rem; font-size: 0.875rem; }
  .sf-context-bar nav ul li.is-active { border-bottom: 3px solid #1589ee; }
  .sf-context-bar nav ul li.is-active a { color: #0070d2; font-weight: 700; }
  .sf-context-bar nav ul li a { color: #444; text-decoration: none; padding: 0.5rem 0; }
  .sf-app-launcher { width: 2rem; height: 2rem; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
  .sf-app-launcher-grid { display: grid; grid-template-columns: repeat(3, 4px); grid-template-rows: repeat(3, 4px); gap: 3px; }
  .sf-app-launcher-grid span { width: 4px; height: 4px; background: #54698d; border-radius: 1px; }
  .sf-app-name { font-size: 1.125rem; font-weight: 700; color: #181818; padding: 0.5rem 0; margin-right: 0.75rem; }
  .sf-kanban-row { display: flex; gap: 0.5rem; overflow-x: auto; padding-bottom: 1rem; }
  .sf-kanban-col { flex: 0 0 18rem; background: #ecebea; border-radius: 0.25rem; }
  .sf-kanban-col-active { background: #fff7e6; border: 2px solid #fe9339; }
  .sf-kanban-col-won { background: #e6f7ed; border: 2px solid #04844b; }
  .sf-kanban-head { padding: 0.5rem; border-bottom: 1px solid #dddbda; }
</style>
</head>
<body class="slds-scope">

<header class="sf-header">
  <img class="sf-cloud-logo" src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/images/logo.svg" alt="Salesforce" />
  <div class="sf-header-search"><div class="slds-form-element"><div class="slds-form-element__control slds-input-has-icon slds-input-has-icon_left"><img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/search.svg" alt="" class="slds-icon slds-input__icon slds-icon-text-default slds-icon_x-small" /><input type="search" placeholder="検索..." class="slds-input"></div></div></div>
  <div class="sf-header-actions">
    <button class="sf-icon-btn"><img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/agent_astro.svg" alt="" /></button>
    <button class="sf-favorite-btn"><img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/favorite.svg" alt="" /><img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/down.svg" alt="" style="width:10px;height:10px;" /></button>
    <button class="sf-icon-btn"><img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/setup.svg" alt="" /></button>
    <span class="slds-avatar slds-avatar_circle slds-avatar_small"><img src="https://ui-avatars.com/api/?name=User&background=1B96FF&color=fff" alt="User"></span>
  </div>
</header>

<div class="sf-context-bar">
  <div class="sf-app-launcher"><div class="sf-app-launcher-grid"><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div></div>
  <span class="sf-app-name">Sales</span>
  <nav><ul>
    <li><a href="#">ホーム</a></li>
    <li><a href="#">取引先 ▾</a></li>
    <li class="is-active"><a href="#">商談 ▾</a></li>
  </ul></nav>
</div>

<main class="sf-main">
  <div class="slds-page-header slds-m-bottom_small">
    <div class="slds-page-header__row">
      <div class="slds-page-header__col-title">
        <div class="slds-media">
          <div class="slds-media__figure">
            <span class="slds-icon_container slds-icon-standard-opportunity">
              <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/standard/opportunity.svg" alt="" class="slds-icon slds-icon_medium" />
            </span>
          </div>
          <div class="slds-media__body">
            <p class="slds-text-title">商談</p>
            <h1 class="slds-page-header__title">マイ商談</h1>
          </div>
        </div>
      </div>
      <div class="slds-page-header__col-actions">
        <ul class="slds-button-group-list">
          <li><button class="slds-button slds-button_neutral">テーブル</button></li>
          <li><button class="slds-button slds-button_brand">カンバン</button></li>
          <li><button class="slds-button slds-button_neutral">新規商談</button></li>
        </ul>
      </div>
    </div>
  </div>

  <div class="sf-kanban-row">
    <div class="sf-kanban-col">
      <div class="sf-kanban-head"><strong>資格確認</strong><div class="slds-text-body_small slds-text-color_weak">2 商談 · ¥5,500,000</div></div>
      <div class="slds-p-around_x-small">
        <article class="slds-card slds-p-around_small">
          <a href="#" class="slds-text-link"><strong>新規案件A</strong></a>
          <p class="slds-text-body_small slds-text-color_weak">取引先A</p>
          <div class="slds-grid slds-grid_align-spread slds-m-top_x-small slds-grid_vertical-align-center">
            <strong class="slds-text-body_small">¥3,500,000</strong>
            <span class="slds-avatar slds-avatar_circle slds-avatar_x-small"><img src="https://ui-avatars.com/api/?name=A&background=1B96FF&color=fff" alt=""></span>
          </div>
        </article>
      </div>
    </div>
    <div class="sf-kanban-col">
      <div class="sf-kanban-head"><strong>ニーズ分析</strong><div class="slds-text-body_small slds-text-color_weak">1 商談 · ¥6,200,000</div></div>
      <div class="slds-p-around_x-small">
        <article class="slds-card slds-p-around_small">
          <a href="#" class="slds-text-link"><strong>新規案件B</strong></a>
          <p class="slds-text-body_small slds-text-color_weak">取引先B</p>
          <div class="slds-grid slds-grid_align-spread slds-m-top_x-small slds-grid_vertical-align-center">
            <strong class="slds-text-body_small">¥6,200,000</strong>
            <span class="slds-avatar slds-avatar_circle slds-avatar_x-small"><img src="https://ui-avatars.com/api/?name=B&background=eb7092&color=fff" alt=""></span>
          </div>
        </article>
      </div>
    </div>
    <div class="sf-kanban-col sf-kanban-col-active">
      <div class="sf-kanban-head"><strong style="color:#8c4b02;">提案/見積</strong><div class="slds-text-body_small">1 商談 · ¥12,000,000</div></div>
      <div class="slds-p-around_x-small">
        <article class="slds-card slds-p-around_small">
          <a href="#" class="slds-text-link"><strong>大型案件</strong></a>
          <p class="slds-text-body_small slds-text-color_weak">取引先C</p>
          <div class="slds-grid slds-grid_align-spread slds-m-top_x-small slds-grid_vertical-align-center">
            <strong class="slds-text-body_small">¥12,000,000</strong>
            <span class="slds-avatar slds-avatar_circle slds-avatar_x-small"><img src="https://ui-avatars.com/api/?name=C&background=1B96FF&color=fff" alt=""></span>
          </div>
        </article>
      </div>
    </div>
    <div class="sf-kanban-col">
      <div class="sf-kanban-head"><strong>交渉/レビュー</strong><div class="slds-text-body_small slds-text-color_weak">0 商談</div></div>
      <div class="slds-p-around_medium slds-text-align_center slds-text-body_small slds-text-color_weak">ドラッグ &amp; ドロップで移動</div>
    </div>
    <div class="sf-kanban-col sf-kanban-col-won">
      <div class="sf-kanban-head"><strong style="color:#04844b;">受注</strong><div class="slds-text-body_small">1 商談 · ¥4,800,000</div></div>
      <div class="slds-p-around_x-small">
        <article class="slds-card slds-p-around_small">
          <a href="#" class="slds-text-link"><strong>追加サポート契約</strong></a>
          <p class="slds-text-body_small slds-text-color_weak">取引先D</p>
          <div class="slds-grid slds-grid_align-spread slds-m-top_x-small slds-grid_vertical-align-center">
            <strong class="slds-text-body_small">¥4,800,000</strong>
            <span class="slds-avatar slds-avatar_circle slds-avatar_x-small"><img src="https://ui-avatars.com/api/?name=D&background=a094ed&color=fff" alt=""></span>
          </div>
        </article>
      </div>
    </div>
  </div>
</main>

</body>
</html>
