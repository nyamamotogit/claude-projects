<!--
  Modals - SLDS モーダル各種
  ===========================================
  使用箇所: 「新規作成」「編集」「削除確認」ボタン押下時

  注意:
    - SLDS では <section role="dialog"> + .slds-backdrop で構成
    - .slds-fade-in-open / .slds-backdrop_open があると表示状態
-->

<!-- ============ 標準モーダル（新規/編集） ============ -->
<section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_medium">
  <div class="slds-modal__container">

    <!-- Header -->
    <header class="slds-modal__header">
      <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close">
        <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/close.svg" alt="" class="slds-button__icon slds-button__icon_large" />
      </button>
      <h2 class="slds-modal__title slds-hyphenate">新規 取引先</h2>
    </header>

    <!-- Body -->
    <div class="slds-modal__content slds-p-around_medium">
      <h3 class="slds-section__title slds-m-bottom_small">取引先情報</h3>
      <div class="slds-grid slds-wrap slds-gutters">
        <div class="slds-col slds-size_1-of-2">
          <div class="slds-form-element slds-form-element_stacked slds-is-required">
            <label class="slds-form-element__label" for="acc-name">
              <abbr class="slds-required" title="必須">*</abbr>取引先名
            </label>
            <div class="slds-form-element__control">
              <input type="text" id="acc-name" class="slds-input">
            </div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2">
          <div class="slds-form-element slds-form-element_stacked">
            <label class="slds-form-element__label" for="acc-phone">電話</label>
            <div class="slds-form-element__control">
              <input type="text" id="acc-phone" class="slds-input">
            </div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2">
          <div class="slds-form-element slds-form-element_stacked">
            <label class="slds-form-element__label" for="acc-industry">業種</label>
            <div class="slds-form-element__control">
              <div class="slds-select_container">
                <select class="slds-select" id="acc-industry">
                  <option>--なし--</option>
                  <option>製造</option>
                  <option>金融</option>
                  <option>小売</option>
                </select>
              </div>
            </div>
          </div>
        </div>
        <div class="slds-col slds-size_1-of-2">
          <div class="slds-form-element slds-form-element_stacked">
            <label class="slds-form-element__label" for="acc-website">Webサイト</label>
            <div class="slds-form-element__control">
              <input type="url" id="acc-website" class="slds-input">
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="slds-modal__footer">
      <button class="slds-button slds-button_neutral">キャンセル</button>
      <button class="slds-button slds-button_outline-brand">保存 &amp; 新規</button>
      <button class="slds-button slds-button_brand">保存</button>
    </footer>
  </div>
</section>
<div class="slds-backdrop slds-backdrop_open"></div>

<!-- ============ 削除確認（小サイズ） ============ -->
<section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_small slds-m-top_xx-large">
  <div class="slds-modal__container">
    <header class="slds-modal__header">
      <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close">
        <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/close.svg" alt="" class="slds-button__icon slds-button__icon_large" />
      </button>
      <h2 class="slds-modal__title">取引先を削除</h2>
    </header>
    <div class="slds-modal__content slds-p-around_medium">
      <p>この取引先を削除してもよろしいですか？ 関連レコードも併せて削除されます。</p>
    </div>
    <footer class="slds-modal__footer">
      <button class="slds-button slds-button_neutral">キャンセル</button>
      <button class="slds-button slds-button_destructive">削除</button>
    </footer>
  </div>
</section>

<!-- ============ 警告ヘッダー型（赤バー付き） ============ -->
<section role="alertdialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open slds-modal_prompt">
  <div class="slds-modal__container">
    <header class="slds-modal__header slds-theme_error slds-theme_alert-texture">
      <h2 class="slds-text-heading_medium slds-hyphenate">承認できません</h2>
    </header>
    <div class="slds-modal__content slds-p-around_medium">
      <p>必須項目が入力されていません。詳細タブで赤マークの項目を確認してください。</p>
    </div>
    <footer class="slds-modal__footer slds-theme_default">
      <button class="slds-button slds-button_brand">OK</button>
    </footer>
  </div>
</section>
