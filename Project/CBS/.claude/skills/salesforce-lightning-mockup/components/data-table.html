<!--
  Data Table - SLDS Datatable / 関連リスト
  ===========================================
  使用箇所: リストビュー本体、関連リスト「連絡先(5)」など

  SLDS の主要クラス:
    slds-table                          … 基本
    slds-table_cell-buffer              … セルに padding
    slds-table_bordered                 … 枠線あり
    slds-table_striped                  … ストライプ
    slds-table_fixed-layout             … 列幅固定
    slds-table_resizable-cols           … リサイズ可能
-->

<!-- ============ 標準データテーブル（リストビュー本体） ============ -->
<article class="slds-card">
  <div class="slds-card__header slds-grid">
    <header class="slds-media slds-media_center slds-has-flexi-truncate">
      <div class="slds-media__figure">
        <span class="slds-icon_container slds-icon-standard-account" title="取引先">
          <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/standard/account.svg" alt="" class="slds-icon slds-icon_small" />
        </span>
      </div>
      <div class="slds-media__body">
        <h2 class="slds-card__header-title">
          <a href="#" class="slds-card__header-link slds-truncate">
            <span>取引先 <span class="slds-text-body_small slds-text-color_weak">(50+ 件)</span></span>
          </a>
        </h2>
      </div>
      <div class="slds-no-flex">
        <button class="slds-button slds-button_neutral">新規</button>
      </div>
    </header>
  </div>

  <!-- Sub Toolbar (Search + Refresh) -->
  <div class="slds-grid slds-grid_align-spread slds-p-around_x-small slds-border_bottom">
    <div class="slds-text-body_small slds-text-color_weak">3 件中 1 - 3 件を表示</div>
    <div class="slds-grid">
      <div class="slds-form-element slds-m-right_x-small">
        <div class="slds-form-element__control slds-input-has-icon slds-input-has-icon_left">
          <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/search.svg" alt="" class="slds-icon slds-input__icon slds-icon-text-default slds-icon_x-small" />
          <input type="search" placeholder="このリストを検索..." class="slds-input">
        </div>
      </div>
      <button class="slds-button slds-button_icon slds-button_icon-border-filled" title="更新">
        <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/refresh.svg" alt="" class="slds-button__icon" />
      </button>
    </div>
  </div>

  <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_resizable-cols" aria-label="取引先">
    <thead>
      <tr class="slds-line-height_reset">
        <th class="slds-text-align_right" scope="col" style="width:3.25rem">
          <div class="slds-th__action slds-th__action_form">
            <input type="checkbox" name="all" id="checkbox-all">
          </div>
        </th>
        <th aria-label="取引先名" aria-sort="none" scope="col">
          <a class="slds-th__action slds-text-link_reset" href="#" tabindex="0">
            <span class="slds-truncate" title="取引先名">取引先名</span>
            <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/arrowdown.svg" alt="" class="slds-icon slds-icon_x-small slds-icon-text-default slds-is-sortable__icon" />
          </a>
        </th>
        <th scope="col"><div class="slds-truncate" title="電話">電話</div></th>
        <th scope="col"><div class="slds-truncate" title="業種">業種</div></th>
        <th scope="col"><div class="slds-truncate" title="所有者">所有者</div></th>
        <th scope="col" style="width:3rem"></th>
      </tr>
    </thead>
    <tbody>
      <tr class="slds-hint-parent">
        <td><input type="checkbox"></td>
        <th scope="row"><a href="#">株式会社 テスト商事</a></th>
        <td>03-1234-5678</td>
        <td>製造</td>
        <td><a href="#">Aoshima Tetsuya</a></td>
        <td>
          <button class="slds-button slds-button_icon slds-button_icon-x-small">
            <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/down.svg" alt="" class="slds-button__icon" />
          </button>
        </td>
      </tr>
      <tr class="slds-hint-parent">
        <td><input type="checkbox"></td>
        <th scope="row"><a href="#">サンプル株式会社</a></th>
        <td>06-9876-5432</td>
        <td>小売</td>
        <td><a href="#">Yamada Hanako</a></td>
        <td>
          <button class="slds-button slds-button_icon slds-button_icon-x-small">
            <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/down.svg" alt="" class="slds-button__icon" />
          </button>
        </td>
      </tr>
      <tr class="slds-hint-parent">
        <td><input type="checkbox"></td>
        <th scope="row"><a href="#">Acme Corp.</a></th>
        <td>+1-555-0100</td>
        <td>金融</td>
        <td><a href="#">Suzuki Ichiro</a></td>
        <td>
          <button class="slds-button slds-button_icon slds-button_icon-x-small">
            <img src="https://cdn.jsdelivr.net/npm/@salesforce-ux/design-system@2.30.4/assets/icons/utility/down.svg" alt="" class="slds-button__icon" />
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <footer class="slds-card__footer">
    <a href="#" class="slds-card__footer-action">すべて表示</a>
  </footer>
</article>
