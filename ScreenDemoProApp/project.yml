# XcodeGen プロジェクト定義
# 使い方: brew install xcodegen && xcodegen generate

name: ScreenDemoPro

options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ALWAYS_SEARCH_USER_PATHS: NO
    CLANG_ENABLE_MODULES: YES

targets:
  ScreenDemoPro:
    type: application
    platform: macOS

    # ソースファイルのルート（サブフォルダごとグループ化）
    sources:
      - path: ScreenDemoPro
        excludes:
          - "Resources/Info.plist"

    # アセット・リソース
    resources:
      - path: ScreenDemoPro/Resources
        buildPhase: resources

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.ScreenDemoPro
        INFOPLIST_FILE: ScreenDemoPro/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ScreenDemoPro/ScreenDemoPro.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""          # ← あなたの Team ID を入力
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: NO
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: ""

    # Carbon / ApplicationServices は macOS に同梱されているのでパス不要
    dependencies:
      - sdk: Carbon.framework
      - sdk: ApplicationServices.framework
